<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">

  <!-- dark background circle -->
  <rect width="32" height="32" rx="6" fill="#111"/>

  <!-- car body -->
  <rect x="2" y="17" width="28" height="9" rx="2.5" fill="#1a1a2e"/>

  <!-- cabin roof -->
  <path d="M6 17 Q8.5 10 12 10 L20 10 Q24 10 25 17Z" fill="#141428"/>

  <!-- windshield -->
  <path d="M7.5 16.5 Q9.5 11.5 12 11.5 L19.5 11.5 Q22.5 11.5 23.5 16.5Z" fill="#4a9fd4" opacity="0.85"/>

  <!-- front wheel -->
  <circle cx="7.5" cy="26" r="3.5" fill="#1a1a1a"/>
  <circle cx="7.5" cy="26" r="2"   fill="#3a3a3a"/>
  <circle cx="7.5" cy="26" r="0.8" fill="#555"/>

  <!-- rear wheel -->
  <circle cx="24.5" cy="26" r="3.5" fill="#1a1a1a"/>
  <circle cx="24.5" cy="26" r="2"   fill="#3a3a3a"/>
  <circle cx="24.5" cy="26" r="0.8" fill="#555"/>

  <!-- headlight -->
  <rect x="28.5" y="19.5" width="2" height="2.5" rx="1" fill="#fffde7" opacity="0.95"/>

  <!-- green charge port -->
  <circle cx="2.5" cy="21" r="1.5" fill="#3ddc84"/>

  <!-- green accent stripe -->
  <rect x="2" y="22.5" width="28" height="1" rx="0.5" fill="#3ddc84" opacity="0.5"/>

</svg>
